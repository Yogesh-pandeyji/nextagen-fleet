<style>

.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}

.tab-bar{display:flex;gap:0;border-bottom:2px solid #e2e8f0;margin-bottom:20px}
.tab{padding:10px 16px;cursor:pointer;font-size:13px;font-weight:500;color:#64748b;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all 0.15s}

.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.detail-item .di-label{font-size:11px;color:#94a3b8;font-weight:500;margin-bottom:2px}
.detail-item .di-value{font-size:13px;color:#1a2332;font-weight:500}
.expense-type-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;margin-bottom:16px}
.exp-type-btn{padding:10px;border:2px solid #e2e8f0;border-radius:8px;cursor:pointer;text-align:center;font-size:12px;font-weight:500;transition:all 0.15s;background:#fff}
.exp-type-btn:hover,.exp-type-btn.selected{border-color:#1E4D5F;background:#f0f9ff;color:#1E4D5F}

<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback} = React;
const supabaseUrl = 'https://zbwtfrzrstpngidzulnz.supabase.co';
const supabaseKey = 'sb_publishable_0-fWGqFLVrBzduQTwiIQbg_tJyJdOoq';
const sb = supabase.createClient(supabaseUrl, supabaseKey);

// ââ helpers ââââââââââââââââââââââââââââââââââââââââââââââ
const fmt = (n) => 'â¹' + Number(n||0).toLocaleString('en-IN');
const fmtDate = (d) => d ? new Date(d).toLocaleDateString('en-IN') : 'â';
const today = () => new Date().toISOString().split('T')[0];
const statusColor = (s) => {
  const m = {Active:'green',Available:'green',Completed:'green',Delivered:'green',Settled:'green',
    'In Transit':'blue','In Progress':'blue',Created:'blue',Scheduled:'blue',
    Pending:'orange',Planned:'orange','New LR':'orange',
    Inactive:'gray',Cancelled:'red',Breakdown:'red',Overdue:'red'};
  return m[s] || 'gray';
};

// ââ store ââââââââââââââââââââââââââââââââââââââââââââââââ
function useStore() {
  const [user,setUser] = useState(null);
  const [company,setCompany] = useState(null);
  const [vehicles,setVehicles] = useState([]);
  const [drivers,setDrivers] = useState([]);
  const [trips,setTrips] = useState([]);
  const [invoices,setInvoices] = useState([]);
  const [parties,setParties] = useState([]);
  const [lorryReceipts,setLorryReceipts] = useState([]);
  const [tripExpenses,setTripExpenses] = useState([]);
  const [routePlans,setRoutePlans] = useState([]);
  const [loading,setLoading] = useState(true);

  const loadAll = async () => {
    const {data:{user:u}} = await sb.auth.getUser();
    if (!u) { setLoading(false); return; }
    setUser(u);
    const [{data:cu}] = [await sb.from('company_users').select('company_id,companies(name)').eq('user_id',u.id).single()];
    if (cu) { setCompany({...cu.companies, id: cu.company_id}); }

    const [v,d,t,inv,p,lr,te,rp] = await Promise.all([
      sb.from('vehicles').select('*').order('created_at',{ascending:false}),
      sb.from('drivers').select('*').order('name'),
      sb.from('trips').select('*').order('created_at',{ascending:false}),
      sb.from('invoices').select('*').order('created_at',{ascending:false}),
      sb.from('parties').select('*').order('name'),
      sb.from('lorry_receipts').select('*').order('created_at',{ascending:false}),
      sb.from('trip_expenses').select('*').order('created_at',{ascending:false}),
      sb.from('route_plans').select('*').order('created_at',{ascending:false}),
    ]);
    setVehicles(v.data||[]);
    setDrivers(d.data||[]);
    setTrips(t.data||[]);
    setInvoices(inv.data||[]);
    setParties(p.data||[]);
    setLorryReceipts(lr.data||[]);
    setTripExpenses(te.data||[]);
    setRoutePlans(rp.data||[]);
    setLoading(false);
  };

  useEffect(() => { loadAll(); }, []);

  return {user,company,vehicles,drivers,trips,invoices,parties,lorryReceipts,tripExpenses,routePlans,
    loading,reload:loadAll,
    setVehicles,setDrivers,setTrips,setInvoices,setParties,setLorryReceipts,setTripExpenses,setRoutePlans};
}

// ââ Modal ââââââââââââââââââââââââââââââââââââââââââââââââ
function Modal({open,onClose,title,children,footer,wide}){
  if(!open) return null;
  return <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div className="modal" style={wide?{maxWidth:800}:{}}>
      <div className="modal-header">
        <h2>{title}</h2>
        <button className="close-btn" onClick={onClose}>â</button>
      </div>
      <div className="modal-body">{children}</div>
      {footer && <div className="modal-footer">{footer}</div>}
    </div>
  </div>;
}

// ââ Login ââââââââââââââââââââââââââââââââââââââââââââââââ
function LoginPage({onLogin}){
  const [email,setEmail]=useState('');
  const [pass,setPass]=useState('');
  const [err,setErr]=useState('');
  const [loading,setLoading]=useState(false);
  const submit = async(e)=>{
    e.preventDefault(); setErr(''); setLoading(true);
    const {error} = await sb.auth.signInWithPassword({email,password:pass});
    if(error){setErr(error.message);setLoading(false);}
    else onLogin();
  };
  return <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#f0f4f7'}}>
    <div style={{background:'#fff',borderRadius:16,padding:40,width:380,boxShadow:'0 4px 24px rgba(0,0,0,0.08)'}}>
      <div style={{textAlign:'center',marginBottom:28}}>
        <div style={{fontSize:28,fontWeight:800,color:'#1E4D5F'}}>nextAgen</div>
        <div style={{fontSize:13,color:'#64748b',marginTop:4}}>Fleet Management Platform</div>
      </div>
      <form onSubmit={submit}>
        <div className="form-group"><label>Email</label><input value={email} onChange={e=>setEmail(e.target.value)} type="email" required placeholder="your@email.com"/></div>
        <div className="form-group"><label>Password</label><input value={pass} onChange={e=>setPass(e.target.value)} type="password" required placeholder="â¢â¢â¢â¢â¢â¢â¢â¢"/></div>
        {err && <div style={{color:'#ef4444',fontSize:12,marginBottom:12}}>{err}</div>}
        <button className="btn btn-primary" style={{width:'100%',justifyContent:'center',padding:10}} disabled={loading}>{loading?'Signing in...':'Sign In'}</button>
      </form>
    </div>
  </div>;
}

// ââ Dashboard ââââââââââââââââââââââââââââââââââââââââââââ
function Dashboard({store}){
  const {vehicles,drivers,trips,invoices,lorryReceipts,tripExpenses} = store;
  const activeVeh = vehicles.filter(v=>v.status==='Active').length;
  const activeTrips = trips.filter(t=>['In Transit','In Progress','Scheduled'].includes(t.status)).length;
  const completedTrips = trips.filter(t=>t.status==='Completed');
  const totalEarnings = completedTrips.reduce((s,t)=>s+Number(t.freight_amount||0),0);
  const totalExpenses = tripExpenses.reduce((s,e)=>s+Number(e.amount||0),0);
  const netIncome = totalEarnings - totalExpenses;
  const avgExpPerTrip = completedTrips.length ? totalExpenses/completedTrips.length : 0;
  const pendingInv = invoices.filter(i=>i.status==='Pending').length;
  const recentTrips = trips.slice(0,5);
  const expByType = {};
  tripExpenses.forEach(e=>{ expByType[e.expense_type] = (expByType[e.expense_type]||0)+Number(e.amount||0); });
  return <div>
    <div className="page-header"><h1>Dashboard</h1><p>Fleet Overview</p></div>
    <div className="stats-grid">
      <div className="stat-card"><div className="label">Total Vehicles</div><div className="value">{vehicles.length}</div><div className="sub">{activeVeh} active</div></div>
      <div className="stat-card"><div className="label">Total Drivers</div><div className="value">{drivers.length}</div><div className="sub">{drivers.filter(d=>d.status==='Available').length} available</div></div>
      <div className="stat-card"><div className="label">Active Trips</div><div className="value">{activeTrips}</div><div className="sub">{trips.length} total</div></div>
      <div className="stat-card"><div className="label">Lorry Receipts</div><div className="value">{lorryReceipts.length}</div><div className="sub">{lorryReceipts.filter(l=>l.status==='Settled').length} settled</div></div>
      <div className="stat-card"><div className="label">Pending Invoices</div><div className="value">{pendingInv}</div><div className="sub">{invoices.length} total</div></div>
    </div>
    <div className="fin-cards">
      <div className="fin-card green"><div className="fc-label">Net Income</div><div className="fc-value">{fmt(netIncome)}</div></div>
      <div className="fin-card blue"><div className="fc-label">Total Earnings</div><div className="fc-value">{fmt(totalEarnings)}</div></div>
      <div className="fin-card red"><div className="fc-label">Total Expenses</div><div className="fc-value">{fmt(totalExpenses)}</div></div>
      <div className="fin-card orange"><div className="fc-label">Avg Expense/Trip</div><div className="fc-value">{fmt(avgExpPerTrip)}</div></div>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20}}>
      <div className="card">
        <div className="card-header"><h3>Recent Trips</h3></div>
        {recentTrips.length===0?<div className="empty"><div>No trips yet</div></div>:
        <table><thead><tr><th>Trip #</th><th>Route</th><th>Status</th><th>Freight</th></tr></thead>
        <tbody>{recentTrips.map(t=><tr key={t.id}>
          <td style={{fontWeight:600}}>{t.trip_number}</td>
          <td>{t.from_location||t.origin||'â'} â {t.to_location||t.destination||'â'}</td>
          <td><span className={`badge badge-${statusColor(t.status)}`}>{t.status}</span></td>
          <td>{fmt(t.freight_amount)}</td>
        </tr>)}</tbody></table>}
      </div>
      <div className="card">
        <div className="card-header"><h3>Expense Breakdown</h3></div>
        {Object.keys(expByType).length===0?<div className="empty"><div>No expenses recorded</div></div>:
        <div>{Object.entries(expByType).sort((a,b)=>b[1]-a[1]).map(([type,amt])=><div key={type} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0',borderBottom:'1px solid #f1f5f9'}}>
          <span style={{fontWeight:500}}>{type}</span>
          <span style={{fontWeight:700,color:'#ef4444'}}>{fmt(amt)}</span>
        </div>)}</div>}
      </div>
    </div>
  </div>;
}

// ââ Parties ââââââââââââââââââââââââââââââââââââââââââââââ
function PartiesPage({store}){
  const {parties,reload} = store;
  const [modal,setModal]=useState(false);
  const [search,setSearch]=useState('');
  const [form,setForm]=useState({name:'',type:'Both',phone:'',email:'',gst_number:'',address:'',city:'',state:''});
  const [saving,setSaving]=useState(false);
  const filtered = parties.filter(p=>p.name?.toLowerCase().includes(search.toLowerCase())||p.city?.toLowerCase().includes(search.toLowerCase()));
  const save = async()=>{
    setSaving(true);
    const {error} = await sb.from('parties').insert([form]);
    setSaving(false);
    if(!error){setModal(false);setForm({name:'',type:'Both',phone:'',email:'',gst_number:'',address:'',city:'',state:''});reload();}
    else alert(error.message);
  };
  return <div>
    <div className="page-header" style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
      <div><h1>Parties</h1><p>Consignors, Consignees & Clients</p></div>
      <button className="btn btn-primary" onClick={()=>setModal(true)}>+ Add Party</button>
    </div>
    <div className="card">
      <div className="search-bar"><input placeholder="Search partiesâ¦" value={search} onChange={e=>setSearch(e.target.value)}/></div>
      {filtered.length===0?<div className="empty"><div className="ei">ð¢</div><div>No parties yet</div></div>:
      <table><thead><tr><th>Name</th><th>Type</th><th>Phone</th><th>GST</th><th>City</th><th>State</th></tr></thead>
      <tbody>{filtered.map(p=><tr key={p.id}>
        <td style={{fontWeight:600}}>{p.name}</td>
        <td><span className={`badge badge-${p.type==='Consignor'?'blue':p.type==='Consignee'?'green':'orange'}`}>{p.type}</span></td>
        <td>{p.phone||'â'}</td><td>{p.gst_number||'â'}</td><td>{p.city||'â'}</td><td>{p.state||'â'}</td>
      </tr>)}</tbody></table>}
    </div>
    <Modal open={modal} onClose={()=>setModal(false)} title="Add Party"
      footer={<><button className="btn btn-secondary" onClick={()=>setModal(false)}>Cancel</button><button className="btn btn-primary" onClick={save} disabled={saving}>{saving?'Savingâ¦':'Save Party'}</button></>}>
      <div className="two-col">
        <div className="form-group" style={{gridColumn:'1/-1'}}><label>Name *</label><input value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="Company/Person name"/></div>
        <div className="form-group"><label>Type</label><select value={form.type} onChange={e=>setForm({...form,type:e.target.value})}>
          <option>Both</option><option>Consignor</option><option>Consignee</option><option>Transporter</option>
        </select></div>
        <div className="form-group"><label>Phone</label><input value={form.phone} onChange={e=>setForm({...form,phone:e.target.value})}/></div>
        <div className="form-group"><label>Email</label><input value={form.email} onChange={e=>setForm({...form,email:e.target.value})} type="email"/></div>
        <div className="form-group"><label>GST Number</label><input value={form.gst_number} onChange={e=>setForm({...form,gst_number:e.target.value})}/></div>
        <div className="form-group" style={{gridColumn:'1/-1'}}><label>Address</label><input value={form.address} onChange={e=>setForm({...form,address:e.target.value})}/></div>
        <div className="form-group"><label>City</label><input value={form.city} onChange={e=>setForm({...form,city:e.target.value})}/></div>
        <div className="form-group"><label>State</label><input value={form.state} onChange={e=>setForm({...form,state:e.target.value})}/></div>
      </div>
    </Modal>
  </div>;
}

// ââ Trips Page âââââââââââââââââââââââââââââââââââââââââââ
function TripsPage({store}){
  const {trips,vehicles,drivers,lorryReceipts,tripExpenses,company,reload} = store;
  const [tab,setTab]=useState('All');
  const [search,setSearch]=useState('');
  const [selTrip,setSelTrip]=useState(null);
  const [showAddTrip,setShowAddTrip]=useState(false);
  const [showAddLR,setShowAddLR]=useState(false);
  const [showAddExp,setShowAddExp]=useState(false);
  const [tripForm,setTripForm]=useState({trip_number:'',origin:'',destination:'',vehicle_id:'',driver_id:'',freight_amount:'',start_date:today(),status:'Scheduled'});
  const [lrForm,setLrForm]=useState({lr_number:'',lr_date:today(),consignor_name:'',consignee_name:'',from_city:'',to_city:'',material_type:'',quantity:'',weight:'',freight_amount:'',advance_amount:'',invoice_number:'',remarks:''});
  const [expForm,setExpForm]=useState({expense_type:'Fuel',amount:'',description:'',recorded_at:today()+'T00:00:00Z'});
  const [saving,setSaving]=useState(false);

  const filtered = trips.filter(t=>{
    const matchTab = tab==='All' || (tab==='Active'&&['In Transit','In Progress','Scheduled'].includes(t.status)) || (tab==='Completed'&&t.status==='Completed');
    const matchSearch = !search || t.trip_number?.toLowerCase().includes(search.toLowerCase()) || (t.origin||t.from_location||'').toLowerCase().includes(search.toLowerCase()) || (t.destination||t.to_location||'').toLowerCase().includes(search.toLowerCase());
    return matchTab && matchSearch;
  });

  const getTripLRs = (tid) => lorryReceipts.filter(l=>l.trip_id===tid);
  const getTripExpenses = (tid) => tripExpenses.filter(e=>e.trip_id===tid);
  const getTripEarning = (t) => {
    const lrs = getTripLRs(t.id);
    return lrs.length ? lrs.reduce((s,l)=>s+Number(l.freight_amount||0),0) : Number(t.freight_amount||0);
  };
  const getTripExpTotal = (tid) => getTripExpenses(tid).reduce((s,e)=>s+Number(e.amount||0),0);

  const saveTrip = async()=>{
    setSaving(true);
    const num = tripForm.trip_number || 'TRP-'+Date.now().toString().slice(-6);
    const {error} = await sb.from('trips').insert([{...tripForm,trip_number:num,from_location:tripForm.origin,to_location:tripForm.destination,company_id:company?.id}]);
    setSaving(false);
    if(!error){setShowAddTrip(false);setTripForm({trip_number:'',origin:'',destination:'',vehicle_id:'',driver_id:'',freight_amount:'',start_date:today(),status:'Scheduled'});reload();}
    else alert(error.message);
  };

  const saveLR = async()=>{
    if(!selTrip){return;}
    setSaving(true);
    const {error} = await sb.from('lorry_receipts').insert([{...lrForm,trip_id:selTrip.id,company_id:company?.id,balance_amount:Number(lrForm.freight_amount||0)-Number(lrForm.advance_amount||0)}]);
    setSaving(false);
    if(!error){setShowAddLR(false);setLrForm({lr_number:'',lr_date:today(),consignor_name:'',consignee_name:'',from_city:'',to_city:'',material_type:'',quantity:'',weight:'',freight_amount:'',advance_amount:'',invoice_number:'',remarks:''});reload();}
    else alert(error.message);
  };

  const saveExp = async()=>{
    if(!selTrip){return;}
    setSaving(true);
    const {error} = await sb.from('trip_expenses').insert([{...expForm,trip_id:selTrip.id,company_id:company?.id}]);
    setSaving(false);
    if(!error){setShowAddExp(false);setExpForm({expense_type:'Fuel',amount:'',description:'',recorded_at:today()+'T00:00:00Z'});reload();}
    else alert(error.message);
  };

  const updateTripStatus = async(t,status)=>{
    await sb.from('trips').update({status}).eq('id',t.id);
    reload();
  };

  const expTypes = ['Fuel','Toll','Driver Payment','Advance','Food','Repair','Loading','Unloading','Other'];

  if(selTrip){
    const trip = trips.find(t=>t.id===selTrip.id) || selTrip;
    const lrs = getTripLRs(trip.id);
    const exps = getTripExpenses(trip.id);
    const earning = getTripEarning(trip);
    const expense = getTripExpTotal(trip.id);
    const profit = earning - expense;
    const stages = ['Scheduled','In Transit','Delivered','Completed'];
    const stageIdx = stages.indexOf(trip.status);
    const veh = vehicles.find(v=>v.id===trip.vehicle_id);
    const drv = drivers.find(d=>d.id===trip.driver_id);
    return <div>
      <div className="page-header" style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
        <div>
          <button className="btn btn-secondary btn-sm" style={{marginBottom:8}} onClick={()=>setSelTrip(null)}>â Back to Trips</button>
          <h1>{trip.trip_number}</h1>
          <p>{trip.origin||trip.from_location||'â'} â {trip.destination||trip.to_location||'â'}</p>
        </div>
        <div style={{display:'flex',gap:8}}>
          <button className="btn btn-primary btn-sm" onClick={()=>setShowAddLR(true)}>+ Add LR</button>
          <button className="btn btn-orange btn-sm" onClick={()=>setShowAddExp(true)}>+ Add Expense</button>
        </div>
      </div>
      <div className="workflow">
        {stages.map((s,i)=><div key={s} className="wf-step"><div className={`wf-stage ${i<stageIdx?'done':i===stageIdx?'active':''}`} onClick={()=>updateTripStatus(trip,s)} style={{cursor:'pointer'}}>{s}</div></div>)}
      </div>
      <div className="pl-row">
        <div className="pl-card earn"><div className="pv">{fmt(earning)}</div><div className="pl">Earning</div></div>
        <div className="pl-card exp"><div className="pv">{fmt(expense)}</div><div className="pl">Expense</div></div>
        <div className="pl-card profit"><div className="pv" style={{color:profit>=0?'#166534':'#991b1b'}}>{fmt(profit)}</div><div className="pl">Profit</div></div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}}>
        <div className="card" style={{margin:0}}>
          <div className="card-header"><h3>Trip Details</h3><span className={`badge badge-${statusColor(trip.status)}`}>{trip.status}</span></div>
          <div className="detail-grid">
            <div className="detail-item"><div className="di-label">Vehicle</div><div className="di-value">{veh?veh.registration_no||veh.vehicle_number:'â'}</div></div>
            <div className="detail-item"><div className="di-label">Driver</div><div className="di-value">{drv?drv.name:'â'}</div></div>
            <div className="detail-item"><div className="di-label">Start Date</div><div className="di-value">{fmtDate(trip.start_date)}</div></div>
            <div className="detail-item"><div className="di-label">End Date</div><div className="di-value">{fmtDate(trip.end_date||trip.expected_end_date)}</div></div>
            <div className="detail-item"><div className="di-label">Distance</div><div className="di-value">{trip.distance_km?trip.distance_km+' km':'â'}</div></div>
            <div className="detail-item"><div className="di-label">Freight</div><div className="di-value">{fmt(trip.freight_amount)}</div></div>
          </div>
        </div>
        <div className="card" style={{margin:0}}>
          <div className="card-header"><h3>Expense Breakdown</h3></div>
          {exps.length===0?<div className="empty" style={{padding:20}}><div>No expenses yet</div></div>:
          <div>{exps.map(e=><div key={e.id} style={{display:'flex',justifyContent:'space-between',alignItems:center,padding:'8px 0',borderBottom:'1px solid #f1f5f9'}}>
            <div><div style={{fontWeight:500,fontSize:13}}>{e.expense_type}</div><div style={{fontSize:11,color:'#94a3b8'}}>{fmtDate(e.recorded_at)}{e.description?' Â· '+e.description:''}</div></div>
            <span style={{fontWeight:700,color:'#ef4444'}}>{fmt(e.amount)}</span>
          </div>)}</div>}
        </div>
      </div>
      <div className="card">
        <div className="card-header"><h3>Lorry Receipts ({lrs.length})</h3></div>
        {lrs.length===0?<div className="empty"><div className="ei">ð<"/div><div>No LRs yet. Add a Lorry Receipt for this trip.</div></div>:
        <table><thead><tr><th>LR No.</th><th>Date</th><th>Consignor</th><th>Consignee</th><th>Material</th><th>Freight</th><th>Advance</th><th>Balance</th><th>Status</th></tr></thead>
        <tbody>{lrs.map(l=><tr key={l.id}>
          <td style={{fontWeight:600,color:'#1E4D5F'}}>{l.lr_number}</td>
          <td>{fmtDate(l.lr_date)}</td>
          <td>{l.consignor_name||'â'}</td>
          <td>{l.consignee_name||'â'}</td>
          <td>{l.material_type||'â'}</td>
          <td>{fmt(l.freight_amount)}</td>
          <td style={{color:'#10b981',fontWeight:600}}>{fmt(l.advance_amount)}</td>
          <td style={{color:'#ef4444',fontWeight:600}}>{fmt(l.balance_amount)}</td>
          <td><span className={`badge badge-${statusColor(l.status)}`}>{l.status||'Created'}</span></td>
        </tr>)}</tbody></table>}
      </div>

      <Modal open={showAddLR} onClose={()=>setShowAddLR(false)} title="Add Lorry Receipt" wide
        footer={<><button className="btn btn-secondary" onClick={()=>setShowAddLR(false)}>Cancel</button><button className="btn btn-primary" onClick={saveLR} disabled={saving}>{saving?'Savingâ¦':'Save LR'}</button></>}>
        <div className="two-col">
          <div className="form-group"><label>LR Number (auto if blank)</label><input value={lrForm.lr_number} onChange={e=>setLrForm({...lrForm,lr_number:e.target.value})} placeholder="Leave blank for auto"/></div>
          <div className="form-group"><label>LR Date</label><input type="date" value={lrForm.lr_date} onChange={e=>setLrForm({...lrForm,lr_date:e.target.value})}/></div>
          <div className="form-group"><label>Consignor (Sender)</label><input value={lrForm.consignor_name} onChange={e=>setLrForm({...lrForm,consignor_name:e.target.value})}/></div>
          <div className="form-group"><label>Consignee (Receiver)</label><input value={lrForm.consignee_name} onChange={e=>setLrForm({...lrForm,consignee_name:e.target.value})}/></div>
          <div className="form-group"><label>From City</label><input value={lrForm.from_city} onChange={e=>setLrForm({...lrForm,from_city:e.target.value})}/></div>
          <div className="form-group"><label>To City</label><input value={lrForm.to_city} onChange={e=>setLrForm({...lrForm,to_city:e.target.value})}/></div>
          <div className="form-group"><label>Material Type</label><input value={lrForm.material_type} onChange={e=>setLrForm({...lrForm,material_type:e.target.value})} placeholder="e.g. Rice, Electronics"/></div>
          <div className="form-group"><label>Quantity</label><input value={lrForm.quantity} onChange={e=>setLrForm({...lrForm,quantity:e.target.value})} placeholder="e.g. 10 bags"/></div>
          <div className="form-group"><label>Weight (kg)</label><input type="number" value={lrForm.weight} onChange={e=>setLrForm({...lrForm,weight:e.target.value})}/></div>
          <div className="form-group"><label>Invoice Number</label><input value={lrForm.invoice_number} onChange={e=>setLrForm({...lrForm,invoice_number:e.target.value})}/></div>
          <div className="form-group"><label>Freight Amount (â¹)</label><input type="number" value={lrForm.freight_amount} onChange={e=>setLrForm({...lrForm,freight_amount:e.target.value})}/></div>
          <div className="form-group"><label>Advance Amount (â¹)</label><input type="number" value={lrForm.advance_amount} onChange={e=>setLrForm({...lrForm,advance_amount:e.target.value})}/></div>
          <div className="form-group" style={{gridColumn:'1/-1'}}><label>Remarks</label><textarea value={lrForm.remarks} onChange={e=>setLrForm({...lrForm,remarks:e.target.value})} rows={2}/></div>
        </div>
      </Modal>

      <Modal open={showAddExp} onClose={()=>setShowAddExp(false)} title="Add Trip Expense"
        footer={<><button className="btn btn-secondary" onClick={()=>setShowAddExp(false)}>Cancel</button><button className="btn btn-primary" onClick={saveExp} disabled={saving}>{saving?'Savingâ¦':'Save Expense'}</button></>}>
        <div className="form-group"><label>Expense Type</label>
          <div className="expense-type-grid">
            {expTypes.map(t=><div key={t} className={`exp-type-btn ${expForm.expense_type===t?'selected':''}`} onClick={()=>setExpForm({...expForm,expense_type:t})}>{t}</div>)}
          </div>
        </div>
        <div className="two-col">
          <div className="form-group"><label>Amount (â¹)</label><input type="number" value={expForm.amount} onChange={e=>setExpForm({...expForm,amount:e.target.value})}/></div>
          <div className="form-group"><label>Date</label><input type="date" value={expForm.recorded_at?.slice(0,10)} onChange={e=>setExpForm({...expForm,recorded_at:e.target.value+'T00:00:00Z'})}/></div>
          <div className="form-group" style={{gridColumn:'1/-1'}}><label>Description / Paid To</label><input value={expForm.description} onChange={e=>setExpForm({...expForm,description:e.target.value})} placeholder="Petrol station, driver name, notes..."/></div>
        </div>
       </Modal>
    </div>;
  }

  return <div>
    <div className="page-header" style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
      <div><h1>Trips</h1><p>Manage all trips and Lorry Receipts</p></div>
      <button className="btn btn-primary" onClick={()=>setShowAddTrip(true)}>+ New Trip</button>
    </div>
    <div className="tab-bar">{['All','Active','Completed'].map(t=><div key={t} className={`tab ${tab===t?'active':''}`} onClick={()=>setTab(t)}>{t}</div>)}</div>
    <div className="card">
      <div className="search-bar"><input placeholder="Search tripsâ¦" value={search} onChange={e=>setSearch(e.target.value)}/></div>
      {filtered.length===0?<div className="empty"><div className="ei">ð</div><div>No trips found</div></div>:
      <table><thead><tr><th>Trip #</th><th>Route</th><th>Vehicle</th><th>Driver</th><th>Freight</th><th>Expenses</th><th>P&L</th><th>LRs</th><th>Status</th><th>Action</th></tr></thead>
      <tbody>{filtered.map(t=>{
        const earning=getTripEarning(t); const expense=getTripExpTotal(t.id); const profit=earning-expense;
        const veh=vehicles.find(v=>v.id===t.vehicle_id); const drv=drivers.find(d=>d.id===t.driver_id);
        return <tr key={t.id}>
          <td style={{fontWeight:600,color:'#1E4D5F',cursor:'pointer'}} onClick={()=>setSelTrip(t)}>{t.trip_number}</td>
          <td style={{fontSize:12}}>{t.origin||t.from_location||'â'} â {t.destination||t.to_location||'â'}</td>
          <td style={{fontSize:12}}>{veh?veh.registration_no||veh.vehicle_number:'â'}</td>
          <td style={{fontSize:12}}>{drv?drv.name:'â'}</td>
          <td style={{color:'#10b981',fontWeight:600}}>{fmt(earning)}</td>
          <td style={{color:'#ef4444',fontWeight:600}}>{fmt(expense)}</td>
          <td style={{fontWeight:700,color:profit>=0?'#166534':'#991b1b'}}>{fmt(profit)}</td>
          <td>{getTripLRs(t.id).length}</td>
          <td><span className={`badge badge-${statusColor(t.status)}`}>{t.status}</span></td>
          <td><button className="btn btn-secondary btn-sm" onClick={()=>setSelTrip(t)}>View</button></td>
        </tr>;
      })}</tbody></table>}
    </div>
    <Modal open={showAddTrip} onClose={()=>setShowAddTrip(false)} title="New Trip"
      footer={<><button className="btn btn-secondary" onClick={()=>setShowAddTrip(false)}>Cancel</button><button className="btn btn-primary" onClick={saveTrip} disabled={saving}>{saving?'Savingâ¦':'Create Trip'}</button></>}>
      <div className="two-col">
        <div className="form-group"><label>Trip Number (auto if blank)</label><input value={tripForm.trip_number} onChange={e=>setTripForm({...tripForm,trip_number:e.target.value})} placeholder="TRP-001"/></div>
        <div className="form-group"><label>Start Date</label><input type="date" value={tripForm.start_date} onChange={e=>setTripForm({...tripForm,start_date:e.target.value})}/></div>
        <div className="form-group"><label>Origin</label><input value={tripForm.origin} onChange={e=>setTripForm({...tripForm,origin:e.target.value})} placeholder="City/Location"/></div>
        <div className="form-group"><label>Destination</label><input value={tripForm.destination} onChange={e=>setTripForm({...tripForm,destination:e.target.value})} placeholder="City/Location"/></div>
        <div className="form-group"><label>Vehicle</label><select value={tripForm.vehicle_id} onChange={e=>setTripForm({...tripForm,vehicle_id:e.target.value})}>
          <option value="">Select Vehicle</option>{vehicles.map(v=><option key={v.id} value={v.id}>{v.registration_no||v.vehicle_number}</option>)}</select></div>
        <div className="form-group"><label>Driver</label><select value={tripForm.driver_id} onChange={e=>setTripForm({...tripForm,driver_id:e.target.value})}>
          <option value="">Select Driver</option>{drivers.map(d=><option key={d.id} value={d.id}>{d.name}</option>)}</select></div>
        <div className="form-group"><label>Freight Amount (â¹)</label><input type="number" value={tripForm.freight_amount} onChange={e=>setTripForm({...tripForm,freight_amount:e.target.value})}/></div>
        <div className="form-group"><label>Status</label><select value={tripForm.status} onChange={e=>setTripForm({...tripForm,status:e.target.value})}>
          <option>Scheduled</option><option>In Transit</option><option>Delivered</option><option>Completed</option></select></div>
      </div>
    </Modal>
  </div>;
}

// ââ LR Management Page âââââââââââââââââââââââââââââââââââ
function LRPage({store}){
  const {lorryReceipts,trips} = store;
  const [search,setSearch]=useState('');
  const [filterStatus,setFilterStatus]=useState('All');
  const statuses=['All','Created','In Transit','Delivered','Settled'];
  const filtered = lorryReceipts.filter(l=>{
    const matchS = filterStatus==='All'||l.status===filterStatus;
    const matchQ = !search||l.lr_number?.toLowerCase().includes(search.toLowerCase())||l.consignor_name?.toLowerCase().includes(search.toLowerCase())||l.consignee_name?.toLowerCase().includes(search.toLowerCase());
    return matchS&&matchQ;
  });
  return <div>
    <div className="page-header"><h1>LR Management</h1><p>All Lorry Receipts across trips</p></div>
    <div className="lr-stage-bar">{statuses.map(s=><div key={s} className={`lr-stage-dot ${filterStatus===s?'active':''}`} onClick={()=>setFilterStatus(s)}>{s}{s!=='All'?' ('+lorryReceipts.filter(l=>l.status===s).length+')':' ('+lorryReceipts.length+')'}</div>)}</div>
    <div className="card">
      <div className="search-bar"><input placeholder="Search LRsâ¦" value={search} onChange={e=>setSearch(e.target.value)}/></div>
      {filtered.length===0?<div className="empty"><div className="ei">ð</div><div>No lorry receipts found</div></div>:
      <table><thead><tr><th>LR No.</th><th>Trip</th><th>Date</th><th>Consignor</th><th>Consignee</th><th>Route</th><th>Material</th><th>Wt(kg)</th><th>Freight</th><th>Advance</th><th>Balance</th><th>Status</th></tr></thead>
      <tbody>{filtered.map(l=>{
        const trip=trips.find(t=>t.id===l.trip_id);
        return <tr key={l.id}>

// ââ Analytics Page âââââââââââââââââââââââââââââââââââââââ
function AnalyticsPage({store}){
  const {trips,tripExpenses,lorryReceipts,vehicles,drivers} = store;
  const completedTrips = trips.filter(t=>t.status==='Completed');
  const getTripEarning = (t) => {
    const lrs = lorryReceipts.filter(l=>l.trip_id===t.id);
    return lrs.length ? lrs.reduce((s,l)=>s+Number(l.freight_amount||0),0) : Number(t.freight_amount||0);
  };
  const getTripExp = (tid) => tripExpenses.filter(e=>e.trip_id===tid).reduce((s,e)=>s+Number(e.amount||0),0);
  const totalEarning = trips.reduce((s,t)=>s+getTripEarning(t),0);
  const totalExp = tripExpenses.reduce((s,e)=>s+Number(e.amount||0),0);
  const netProfit = totalEarning - totalExp;
  const profitMargin = totalEarning>0?(netProfit/totalEarning*100).toFixed(1):0;
  const expByType = {};
  tripExpenses.forEach(e=>{ expByType[e.expense_type]=(expByType[e.expense_type]||0)+Number(e.amount||0); });
  const topTrips = [...trips].map(t=>({...t,pl:getTripEarning(t)-getTripExp(t.id)})).sort((a,b)=>b.pl-a.pl).slice(0,5);
  const avgFreight = completedTrips.length ? completedTrips.reduce((s,t)=>s+getTripEarning(t),0)/completedTrips.length : 0;
  return <div>
    <div className="page-header"><h1>Analytics</h1><p>Financial & Fleet Performance</p></div>
    <div className="fin-cards">
      <div className="fin-card green"><div className="fc-label">Net Profit</div><div className="fc-value">{fmt(netProfit)}</div></div>
      <div className="fin-card blue"><div className="fc-label">Total Earnings</div><div className="fc-value">{fmt(totalEarning)}</div></div>
      <div className="fin-card red"><div className="fc-label">Total Expenses</div><div className="fc-value">{fmt(totalExp)}</div></div>
      <div className="fin-card orange"><div className="fc-label">Profit Margin</div><div className="fc-value">{profitMargin}%</div></div>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20}}>
      <div className="card">
        <div className="card-header"><h3>Expense by Category</h3></div>
        {Object.keys(expByType).length===0?<div className="empty">No expenses data</div>:
        <div>{Object.entries(expByType).sort((a,b)=>b[1]-a[1]).map(([type,amt])=>{
          const pct = totalExp>0?(amt/totalExp*100).toFixed(0):0;
          return <div key={type} style={{marginBottom:12}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
              <span style={{fontWeight:500,fontSize:13}}>{type}</span>
              <span style={{fontWeight:700,fontSize:13}}>{fmt(amt)} <span style={{color:'#94a3b8',fontWeight:400}}>({pct}%)</span></span>
            </div>
            <div style={{background:'#f1f5f9',borderRadius:4,height:6}}>
              <div style={{background:'#1E4D5F',borderRadius:4,height:6,width:pct+'%'}}></div>
            </div>
          </div>;
        })}</div>}
      </div>
      <div className="card">
        <div className="card-header"><h3>Top 5 Trips by P&L</h3></div>
        {topTrips.length===0?<div className="empty">No trips data</div>:
        <div>{topTrips.map(t=><div key={t.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0',borderBottom:'1px solid #f1f5f9'}}>
          <div>
            <div style={{fontWeight:600,fontSize:13}}>{t.trip_number}</div>
            <div style={{fontSize:11,color:'#94a3b8'}}>{t.origin||t.from_location||'â'} â {t.destination||t.to_location||'â'}</div>
          </div>
          <span style={{fontWeight:700,color:t.pl>=0?'#10b981':'#ef4444',fontSize:15}}>{fmt(t.pl)}</span>
        </div>)}</div>}
      </div>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:20,marginTop:20}}>
      <div className="stat-card"><div className="label">Completed Trips</div><div className="value">{completedTrips.length}</div><div className="sub">out of {trips.length} total</div></div>
      <div className="stat-card"><div className="label">Avg Freight/Trip</div><div className="value" style={{fontSize:18}}>{fmt(avgFreight)}</div><div className="sub">completed trips</div></div>
      <div className="stat-card"><div className="label">Avg Expense/Trip</div><div className="value" style={{fontSize:18}}>{fmt(completedTrips.length?totalExp/completedTrips.length:0)}</div><div className="sub">all trips</div></div>
    </div>
  </div>;
}

// ââ Alerts Page ââââââââââââââââââââââââââââââââââââââââââ
function AlertsPage({store}){
  const {vehicles,drivers,trips,lorryReceipts} = store;
  const alerts = [];
  // License expiry alerts
  drivers.forEach(d=>{
    if(!d.license_expiry) return;
    const diff=(new Date(d.license_expiry)-new Date())/(1000*60*60*24);
    if(diff<0) alerts.push({level:'high',title:'License Expired',msg:`${d.name} â license expired on ${fmtDate(d.license_expiry)}`,icon:'ð«'});
    else if(diff<=30) alerts.push({level:'high',title:'License Expiring Soon',msg:`${d.name} â expires in ${Math.round(diff)} days (${fmtDate(d.license_expiry)})`,icon:'â ï¸'});
    else if(diff<=90) alerts.push({level:'med',title:'License Renewal Reminder',msg:`${d.name} â expires in ${Math.round(diff)} days`,icon:'ð'});
  });
  // Vehicle document expiry alerts
  vehicles.forEach(v=>{
    const reg = v.registration_no||v.vehicle_number||v.id;
    const checkDoc = (expDate, docName) => {
      if(!expDate) return;
      const diff=(new Date(expDate)-new Date())/(1000*60*60*24);
      if(diff<0) alerts.push({level:'high',title:`${docName} Expired`,msg:`${reg} â ${docName} expired on ${fmtDate(expDate)}`,icon:'ð«'});
      else if(diff<=30) alerts.push({level:'high',title:`${docName} Expiring`,msg:`${reg} â expires in ${Math.round(diff)} days (${fmtDate(expDate)})`,icon:'â ï¸'});
      else if(diff<=90) alerts.push({level:'med',title:`${docName} Due`,msg:`${reg} â renew by ${fmtDate(expDate)} (${Math.round(diff)} days)`,icon:'ð'});
    };
    checkDoc(v.insurance_expiry,'Insurance');
    checkDoc(v.fitness_expiry,'Fitness Certificate');
    checkDoc(v.permit_expiry,'Permit');
  });
  // Vehicles in breakdown
  vehicles.filter(v=>v.status==='Breakdown'||v.status==='Maintenance').forEach(v=>{
    alerts.push({level:'high',title:'Vehicle Off Road',msg:`${v.registration_no||v.vehicle_number} is in ${v.status}`,icon:'ð§'});
  });
  // Long-running active trips
  trips.filter(t=>['In Transit','In Progress'].includes(t.status)).forEach(t=>{
    if(!t.start_date) return;
    const days=(new Date()-new Date(t.start_date))/(1000*60*60*24);
    if(days>7) alerts.push({level:'med',title:'Long Running Trip',msg:`${t.trip_number} has been running for ${Math.round(days)} days`,icon:'ð'});
  });
  // Pending LR balance
  lorryReceipts.filter(l=>Number(l.balance_amount||0)>0&&l.status!=='Settled').forEach(l=>{
    alerts.push({level:'low',title:'LR Balance Pending',msg:`${l.lr_number} â balance ${fmt(l.balance_amount)} pending from ${l.consignee_name||'consignee'}`,icon:'ð°'});
  });
  const high=alerts.filter(a=>a.level==='high');
  const med=alerts.filter(a=>a.level==='med');
  const low=alerts.filter(a=>a.level==='low');
  return <div>
    <div className="page-header"><h1>Alerts</h1><p>Important notifications & reminders</p></div>
    <div className="stats-grid">
      <div className="stat-card"><div className="label">Critical</div><div className="value" style={{color:'#ef4444'}}>{high.length}</div></div>
      <div className="stat-card"><div className="label">Warnings</div><div className="value" style={{color:'#f59e0b'}}>{med.length}</div></div>
      <div className="stat-card"><div className="label">Info</div><div className="value" style={{color:'#10b981'}}>{low.length}</div></div>
    </div>
    {alerts.length===0?<div className="card"><div className="empty"><div className="ei">â</div><div>All clear! No alerts at this time.</div></div></div>:
    <div className="card">
      {[...high,...med,...low].map((a,i)=><div key={i} className={`alert-item alert-${a.level==='high'?'high':a.level==='med'?'med':'low'}`}>
        <span style={{fontSize:20}}>{a.icon}</span>
        <div><div style={{fontWeight:600,fontSize:13}}>{a.title}</div><div style={{fontSize:12,marginTop:2}}>{a.msg}</div></div>
      </div>)}
    </div>}
  </div>;
}

// ââ App ââââââââââââââââââââââââââââââââââââââââââââââââââ
function App(){
  const store = useStore();
  const [page,setPage] = useState('dashboard');
  const [authed,setAuthed] = useState(false);
  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{ if(session) setAuthed(true); });
    const {data:{subscription}} = sb.auth.onAuthStateChange((_,session)=>{ setAuthed(!!session); });
    return ()=>subscription.unsubscribe();
  },[]);
  if(!authed) return <LoginPage onLogin={()=>{ setAuthed(true); store.reload(); }}/>;
  if(store.loading) return <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:12}}>
    <div style={{width:40,height:40,border:'3px solid #e2e8f0',borderTopColor:'#1E4D5F',borderRadius:'50%',animation:'spin 0.8s linear infinite'}}></div>
    <div style={{color:'#64748b',fontSize:14}}>Loading fleet dataâ¦</div>
  </div>;
  const pages = {
    dashboard:<Dashboard store={store}/>,
    trips:<TripsPage store={store}/>,
    lr:<LRPage store={store}/>,
    fleet:<FleetPage store={store}/>,
    drivers:<DriversPage store={store}/>,
    invoices:<InvoicesPage store={store}/>,
    epod:<ePODPage store={store}/>,
    parties:<PartiesPage store={store}/>,
    routes:<RoutePlannerPage store={store}/>,
    analytics:<AnalyticsPage store={store}/>,
    maintenance:<MaintenancePage store={store}/>,
    alerts:<AlertsPage store={store}/>,
    settings:<SettingsPage store={store} onLogout={()=>setAuthed(false)}/>,
  };
  return <>
    <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
    <Sidebar page={page} setPage={setPage} company={store.company} user={store.user}/>
    <div className="main">{pages[page]||pages.dashboard}</div>
  </>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
